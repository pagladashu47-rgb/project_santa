<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Merry Christmas!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #e8ede9;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow: hidden;
      background: #e8ede9;
    }

    .bg-svg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: #f5f0eb;
      border-radius: 24px;
      overflow: hidden;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 2px 24px rgba(60,70,50,0.08);
    }

    .photo-placeholder {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: block;
      overflow: hidden;
    }

    .photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
    }

    .bottom {
      padding: 1.4rem 1.6rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .question-text {
      font-size: 17px;
      font-weight: 400;
      color: #2e3028;
      line-height: 1.55;
      letter-spacing: -0.01em;
    }

    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 12px 0;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      flex: 1;
      transition: transform 0.15s, opacity 0.15s;
      letter-spacing: 0.01em;
    }

    .btn:active { transform: scale(0.97); }

    .btn-yes {
      background: #3b4a35;
      color: #e8ede9;
    }
    .btn-yes:hover { opacity: 0.85; }

    .btn-no {
      background: #ddd8d0;
      color: #5a5650;
    }
    .btn-no:hover { opacity: 0.85; }

    .btn-no.escaped {
      position: fixed;
      z-index: 999;
      flex: none;
    }

    /* ── thank you state ── */
    .thanks {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 1;
      border-radius: 24px;
      overflow: hidden;
      background: #f5f0eb;
      box-shadow: 0 2px 24px rgba(60,70,50,0.08);
      animation: fadeUp 0.45s ease forwards;
    }
    .thanks.show { display: flex; flex-direction: column; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .thanks-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      display: block;
    }

    .thanks-bottom {
      padding: 1.4rem 1.6rem 1.6rem;
      width: 100%;
    }

    .thanks-msg {
      font-size: 17px;
      font-weight: 400;
      color: #2e3028;
      line-height: 1.55;
    }

    .thanks-sub {
      margin-top: 6px;
      font-size: 13px;
      color: #7a7870;
    }

    .thanks-time {
      margin-top: 14px;
      font-size: 13px;
      color: #5a5650;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .map-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 10px 14px;
      background: #3b4a35;
      color: #e8ede9;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
      width: fit-content;
    }
    .map-link:hover { opacity: 0.82; }
    .map-link svg { flex-shrink: 0; }

    @media (max-width: 420px) {
      .card, .thanks { border-radius: 18px; }
      .question-text, .thanks-msg { font-size: 16px; }
    }
  </style>
</head>
<body>

  <!-- background blobs -->
  <svg class="bg-svg" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <circle cx="340" cy="80"  r="160" fill="#c9d4c5" opacity="0.55"/>
    <circle cx="30"  cy="300" r="130" fill="#b8cbb3" opacity="0.4"/>
    <circle cx="380" cy="540" r="200" fill="#c9d4c5" opacity="0.35"/>
    <circle cx="70"  cy="680" r="110" fill="#b8cbb3" opacity="0.3"/>
    <ellipse cx="200" cy="400" rx="300" ry="130" fill="#d4dcd0" opacity="0.2"/>
  </svg>

  <div class="wrapper">

    <!-- ── MAIN CARD ── -->
    <div class="card" id="main-card">

     
        <img src="gg.jpg" alt="photo" style="width: 100%; height: auto;" />
      

      <div class="bottom">
      
        <div class="btn-row">
          <button class="btn btn-yes" id="yes-btn">yeah, sure</button>
          <button class="btn btn-no" id="no-btn">nah</button>
        </div>
      </div>
    </div>

    <!-- ── THANKS CARD ── -->
    <div class="thanks" id="thanks-card">
      <div class="thanks-photo">
        <svg viewBox="0 0 380 285" width="100%" xmlns="http://www.w3.org/2000/svg">
          <rect width="380" height="285" fill="#b8cbb3"/>
          <ellipse cx="190" cy="340" rx="220" ry="160" fill="#9fb89a" opacity="0.6"/>
          <circle cx="70"  cy="60"  r="55" fill="#c9d4c5" opacity="0.7"/>
          <circle cx="310" cy="40"  r="40" fill="#afc0aa" opacity="0.5"/>
          <ellipse cx="190" cy="200" rx="140" ry="70" fill="#a8bda3" opacity="0.5"/>
          <circle cx="190" cy="120" r="44" fill="#f5f0eb" opacity="0.95"/>
          <path d="M175 116 Q190 128 205 116" stroke="#3b4a35" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          <circle cx="181" cy="110" r="3" fill="#3b4a35"/>
          <circle cx="199" cy="110" r="3" fill="#3b4a35"/>
        </svg>
      </div>
      <div class="thanks-bottom">
        <p class="thanks-msg">see you there.</p>
        <p class="thanks-sub">Friday, 4pm — don't be late.</p>
        <a class="map-link" href="https://maps.app.goo.gl/BDCnJjmXNPPypt4v9" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#e8ede9"/>
            <circle cx="12" cy="9" r="2.5" fill="#3b4a35"/>
          </svg>
          see you here
        </a>
      </div>
    </div>

  </div>

  <script>
    const MARGIN     = 16;
    const noBtn      = document.getElementById('no-btn');
    const yesBtn     = document.getElementById('yes-btn');
    const mainCard   = document.getElementById('main-card');
    const thanksCard = document.getElementById('thanks-card');
    let escaped = false;

    function escapeAndMove() {
      if (!escaped) {
        const rect = noBtn.getBoundingClientRect();
        const w = rect.width || 120;
        const h = rect.height || 44;
        noBtn.classList.add('escaped');
        noBtn.style.width  = w + 'px';
        noBtn.style.left   = rect.left + 'px';
        noBtn.style.top    = rect.top  + 'px';
        noBtn.style.right  = 'auto';
        noBtn.style.bottom = 'auto';
        escaped = true;
        requestAnimationFrame(moveNo);
      } else {
        moveNo();
      }
    }

    function moveNo() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const w  = noBtn.offsetWidth  || 120;
      const h  = noBtn.offsetHeight || 44;
      noBtn.style.left   = (Math.random() * (vw - w - MARGIN * 2) + MARGIN) + 'px';
      noBtn.style.top    = (Math.random() * (vh - h - MARGIN * 2) + MARGIN) + 'px';
      noBtn.style.right  = 'auto';
      noBtn.style.bottom = 'auto';
    }

    noBtn.addEventListener('mouseover', escapeAndMove);
    noBtn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      escapeAndMove();
    }, { passive: false });

    noBtn.addEventListener('click', function(e) {
      e.preventDefault();
    });

    yesBtn.addEventListener('click', function() {
      mainCard.style.display = 'none';
      noBtn.style.display    = 'none';
      thanksCard.classList.add('show');
    });
  </script>

</body>
</html>
